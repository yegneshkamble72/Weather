<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>YK Weather Pro</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
background: linear-gradient(135deg,#0f172a,#1e293b);
}

/* Loader */
#loader{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#020617;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.loader-circle{
width:60px;height:60px;
border:5px solid #334155;
border-top:5px solid #38bdf8;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

/* Glass effect */
.glass{
background: rgba(255,255,255,0.08);
backdrop-filter: blur(12px);
border:1px solid rgba(255,255,255,0.1);
}
</style>
</head>

<body class="text-white">

<!-- Loader -->
<div id="loader">
  <div class="loader-circle"></div>
</div>

<!-- NAVBAR -->
<nav class="glass px-6 py-4 flex justify-between items-center">
  <h1 class="text-xl font-bold">YK WEATHER</h1>
  <div class="flex gap-4 text-sm">
    <a href="#" class="hover:text-cyan-400">Home</a>
    <a href="#" class="hover:text-cyan-400">Help</a>
    <a href="#" class="hover:text-cyan-400">Contact</a>
  </div>
</nav>

<!-- MAIN -->
<div class="flex items-center justify-center p-4 mt-6">

<div class="glass w-full max-w-3xl rounded-2xl p-6 shadow-xl">

<!-- TOP -->
<div class="flex flex-col md:flex-row justify-between gap-4">
  <div>
    <h2 class="text-2xl font-bold">Weather Dashboard</h2>
    <p class="text-sm text-gray-300">Search city or use GPS</p>
  </div>

  <div class="flex gap-2">
    <button id="geoBtn" class="bg-cyan-500 px-3 py-2 rounded">📍</button>
    <button id="toggleUnits" class="bg-gray-700 px-3 py-2 rounded">°C</button>
  </div>
</div>

<!-- SEARCH -->
<div class="mt-4 flex gap-2">
  <input id="searchInput" placeholder="Enter city..."
  class="flex-1 p-3 rounded bg-gray-800 text-white outline-none"/>
  <button id="searchBtn" class="bg-cyan-500 px-5 rounded font-semibold">Search</button>
</div>

<!-- WEATHER -->
<div class="text-center mt-6">
  <h2 id="locationName" class="text-xl font-bold">—</h2>
  <p id="localTime" class="text-gray-400 text-sm"></p>

  <div id="temp" class="text-5xl font-bold mt-4">—</div>
  <div id="desc" class="text-gray-300 capitalize"></div>
</div>

<!-- DETAILS -->
<div class="grid grid-cols-2 gap-4 mt-6 text-sm">
  <div class="glass p-3 rounded">🌡 <span id="feels"></span></div>
  <div class="glass p-3 rounded">💧 <span id="humidity"></span></div>
  <div class="glass p-3 rounded">💨 <span id="wind"></span></div>
  <div class="glass p-3 rounded">🌅 <span id="sun"></span></div>
</div>

</div>
</div>

<!-- FOOTER -->
<footer class="text-center text-gray-400 text-sm mt-6 pb-4">
  © 2026 YK OFFICIAL • Weather App • Help | Contact
</footer>

<script>
const API_KEY = "536a41fb909a99fff37534418199a1e9";
let units = "metric";

const searchBtn = document.getElementById("searchBtn");
const searchInput = document.getElementById("searchInput");
const geoBtn = document.getElementById("geoBtn");
const toggleUnits = document.getElementById("toggleUnits");

const locationName = document.getElementById("locationName");
const localTime = document.getElementById("localTime");
const temp = document.getElementById("temp");
const desc = document.getElementById("desc");
const feels = document.getElementById("feels");
const humidity = document.getElementById("humidity");
const wind = document.getElementById("wind");
const sun = document.getElementById("sun");

async function getWeather(city){
try{
document.getElementById("loader").style.display="flex";

const res = await fetch(
`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=${units}`
);

const data = await res.json();

if(data.cod != 200){
alert("City not found");
return;
}

locationName.innerHTML = data.name;
temp.innerHTML = Math.round(data.main.temp) + (units=="metric"?"°C":"°F");
desc.innerHTML = data.weather[0].description;

feels.innerHTML = "Feels: " + Math.round(data.main.feels_like);
humidity.innerHTML = "Humidity: " + data.main.humidity + "%";
wind.innerHTML = "Wind: " + data.wind.speed;

sun.innerHTML = "Sunrise: " + new Date(data.sys.sunrise*1000).toLocaleTimeString();

localTime.innerHTML = new Date().toLocaleString();

}catch(e){
alert("Error");
}
finally{
document.getElementById("loader").style.display="none";
}
}

searchBtn.onclick = ()=> getWeather(searchInput.value);

searchInput.addEventListener("keypress",e=>{
if(e.key==="Enter") getWeather(searchInput.value);
});

geoBtn.onclick = ()=>{
navigator.geolocation.getCurrentPosition(pos=>{
fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&appid=${API_KEY}&units=${units}`)
.then(res=>res.json())
.then(data=>{
locationName.innerHTML = data.name;
temp.innerHTML = Math.round(data.main.temp)+"°C";
desc.innerHTML = data.weather[0].description;
});
});
};

toggleUnits.onclick = ()=>{
units = units=="metric"?"imperial":"metric";
toggleUnits.innerHTML = units=="metric"?"°C":"°F";
};

window.onload = ()=> getWeather("Nagpur");
</script>

</body>
</html>
