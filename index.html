<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>YK Weather App</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
.bg-clear { background: linear-gradient(180deg,#60a5fa 0%, #93c5fd 100%); }
.bg-clouds { background: linear-gradient(180deg,#cbd5e1 0%, #94a3b8 100%); }
.bg-rain { background: linear-gradient(180deg,#64748b 0%, #0f172a 100%); }
.bg-snow { background: linear-gradient(180deg,#e6eef8 0%, #cfe9ff 100%); }
.bg-thunder { background: linear-gradient(180deg,#0f172a 0%, #0b1120 100%); }

#loader{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#020617;
display:flex;
align-items:center;
justify-content:center;
color:white;
z-index:9999;
}
</style>
</head>

<body class="min-h-screen flex items-center justify-center bg-gray-100 p-4">

<div id="loader">Loading Weather...</div>

<div class="w-full max-w-3xl rounded-2xl shadow-2xl overflow-hidden">
  
  <!-- HEADER -->
  <div id="hero" class="p-6 bg-clear text-white">
    <div class="flex flex-col md:flex-row justify-between gap-4">
      <div>
        <h1 class="text-2xl md:text-3xl font-bold">YK Weather App</h1>
        <p class="text-sm opacity-90">Search city or use location</p>
      </div>

      <div class="flex gap-2">
        <button id="geoBtn" class="bg-white/20 px-3 py-2 rounded">📍</button>
        <button id="toggleUnits" class="bg-white/20 px-3 py-2 rounded">°C</button>
      </div>
    </div>

    <div class="mt-4 flex gap-2">
      <input id="searchInput" type="text" placeholder="Enter city..."
      class="flex-1 p-2 rounded text-black"/>
      <button id="searchBtn" class="bg-white text-black px-4 rounded">Search</button>
    </div>
  </div>

  <!-- BODY -->
  <div class="bg-white p-6 text-center">
    <h2 id="locationName" class="text-xl font-bold">—</h2>
    <p id="localTime" class="text-sm text-gray-500"></p>

    <div class="text-4xl font-bold mt-4" id="temp">—</div>
    <div id="desc" class="text-gray-600"></div>

    <div class="mt-4 text-sm">
      <p id="feels"></p>
      <p id="humidity"></p>
      <p id="wind"></p>
      <p id="sun"></p>
    </div>
  </div>
</div>

<script>
const API_KEY = "536a41fb909a99fff37534418199a1e9";
let units = "metric";

const searchBtn = document.getElementById("searchBtn");
const searchInput = document.getElementById("searchInput");
const geoBtn = document.getElementById("geoBtn");
const toggleUnits = document.getElementById("toggleUnits");

const locationName = document.getElementById("locationName");
const localTime = document.getElementById("localTime");
const temp = document.getElementById("temp");
const desc = document.getElementById("desc");
const feels = document.getElementById("feels");
const humidity = document.getElementById("humidity");
const wind = document.getElementById("wind");
const sun = document.getElementById("sun");
const hero = document.getElementById("hero");

function setBG(main){
hero.className = "p-6 text-white";
if(main.includes("Cloud")) hero.classList.add("bg-clouds");
else if(main.includes("Rain")) hero.classList.add("bg-rain");
else hero.classList.add("bg-clear");
}

async function getWeather(city){
try{
document.getElementById("loader").style.display="flex";

const res = await fetch(
`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=${units}`
);

const data = await res.json();

if(data.cod != 200){
alert("City not found");
return;
}

locationName.innerHTML = data.name;
temp.innerHTML = Math.round(data.main.temp) + (units=="metric"?"°C":"°F");
desc.innerHTML = data.weather[0].description;

feels.innerHTML = "Feels: " + Math.round(data.main.feels_like);
humidity.innerHTML = "Humidity: " + data.main.humidity + "%";
wind.innerHTML = "Wind: " + data.wind.speed;

sun.innerHTML = "Sunrise: " + new Date(data.sys.sunrise*1000).toLocaleTimeString();

setBG(data.weather[0].main);

localTime.innerHTML = new Date().toLocaleString();

}catch(e){
alert("Error");
}
finally{
document.getElementById("loader").style.display="none";
}
}

searchBtn.onclick = ()=> getWeather(searchInput.value);

searchInput.addEventListener("keypress",e=>{
if(e.key==="Enter") getWeather(searchInput.value);
});

geoBtn.onclick = ()=>{
navigator.geolocation.getCurrentPosition(pos=>{
fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&appid=${API_KEY}&units=${units}`)
.then(res=>res.json())
.then(data=>{
locationName.innerHTML = data.name;
temp.innerHTML = Math.round(data.main.temp)+"°C";
desc.innerHTML = data.weather[0].description;
});
});
};

toggleUnits.onclick = ()=>{
units = units=="metric"?"imperial":"metric";
toggleUnits.innerHTML = units=="metric"?"°C":"°F";
};

window.onload = ()=> getWeather("Nagpur");
</script>

</body>
</html>
